<svg viewBox="0 0 720 480" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">
<rect width="720" height="480" fill="#faf8f4"/>
<text x="360" y="38" text-anchor="middle" font-size="20" fill="#1a1a2e">The predicted learning arc</text>
<text x="360" y="62" text-anchor="middle" font-size="14" fill="#e94560" font-style="italic" letter-spacing="1">HYPOTHESIS &#8212; NOT DATA</text>
<!-- axes -->
<line x1="90" y1="380" x2="660" y2="380" stroke="#1a1a2e" stroke-width="2"/>
<line x1="90" y1="380" x2="90" y2="90" stroke="#1a1a2e" stroke-width="2"/>
<path d="M 660 380 l -10 -5 v 10 z" fill="#1a1a2e"/>
<path d="M 90 90 l -5 10 h 10 z" fill="#1a1a2e"/>
<text x="375" y="415" text-anchor="middle" font-size="15" fill="#1a1a2e">hours of play</text>
<text x="52" y="240" text-anchor="middle" font-size="15" fill="#1a1a2e" transform="rotate(-90 52 240)">time to judge a 4-D fit</text>
<!-- Kantian ceiling: flat line -->
<line x1="90" y1="150" x2="640" y2="150" stroke="#8888aa" stroke-width="2" stroke-dasharray="8 6"/>
<text x="636" y="136" text-anchor="end" font-size="14" fill="#8888aa" font-style="italic">Kant&#8217;s ceiling: judgment stays inferential, no transition</text>
<!-- Reidian curve: sigmoid drop -->
<path d="M 90 155 C 220 152, 280 150, 340 190 C 400 230, 420 300, 480 322 C 530 340, 590 344, 640 345"
      fill="none" stroke="#e94560" stroke-width="3.2"/>
<!-- annotations -->
<text x="150" y="195" font-size="14" fill="#1a1a2e">explicit translation:</text>
<text x="150" y="213" font-size="14" fill="#1a1a2e">slice-by-slice reasoning,</text>
<text x="150" y="231" font-size="14" fill="#1a1a2e">tracking w symbolically</text>
<line x1="405" y1="255" x2="470" y2="215" stroke="#bbb" stroke-width="1"/>
<text x="475" y="205" font-size="14" fill="#e94560" font-style="italic">the transition &#8212; if Reid is right</text>
<text x="470" y="300" font-size="14" fill="#1a1a2e">quasi-perceptual recognition:</text>
<text x="470" y="318" font-size="14" fill="#1a1a2e">fast, automatic, unreflective</text>
<text x="360" y="455" text-anchor="middle" font-size="14" font-style="italic" fill="#666">Measurable traces: reaction times, error patterns, transfer to novel 4-D tasks</text>
</svg>
